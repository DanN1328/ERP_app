{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registrar Cliente</h4>
        </div>

        <div class="card-body">

            <form action="/crearCliente/" method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label for="nombre" class="form-label">
                        Nombre del cliente
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="nombre"
                        name="nombre"
                        maxlength="100"
                        required
                    >
                </div>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-success">
                        Guardar Cliente
                    </button>

                    <a
                        href="/menu"
                        class="btn btn-secondary">
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>
<!-- Cuadro de búsqueda -->

<div class="card shadow-sm mt-4">

    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Clientes Registrados</h5>

        <div style="width: 300px;">
            <input
                type="text"
                id="searchInput"
                onkeyup="filtrarTabla()"
                placeholder="Buscar cliente..."
                class="form-control form-control-sm">
        </div>
    </div>

    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover table-striped mb-0" id="miTabla">
                <thead class="table-dark">
                    <tr>
                        <th width="15%">ID</th>
                        <th>Cliente</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cliente in Clientes %}
                    <tr>
                        <td>
                            <span class="badge bg-secondary">
                                {{ cliente.id }}
                            </span>
                        </td>
                        <td>
                            {{ cliente.nombre }}
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="text-center text-muted py-4">
                            No existen clientes registrados
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function filtrarTabla() {
    // Obtener el valor del input y pasarlo a minúsculas
    const input = document.getElementById("searchInput");
    const filter = input.value.toLowerCase();
    
    // Obtener la tabla y las filas
    const table = document.getElementById("miTabla");
    const tr = table.getElementsByTagName("tr");

    // Recorrer todas las filas (omitiendo el encabezado)
    for (i = 1; i < tr.length; i++) {
        let rowVisible = false;
        // Obtener todas las celdas de la fila actual
        const td = tr[i].getElementsByTagName("td");
        
        for (j = 0; j < td.length; j++) {
            if (td[j]) {
                const txtValue = td[j].textContent || td[j].innerText;
                // Si el texto coincide con la búsqueda, mostrar la fila
                if (txtValue.toLowerCase().indexOf(filter) > -1) {
                    rowVisible = true;
                    break;
                }
            }
        }
        // Ocultar o mostrar la fila según el resultado
        if (rowVisible) {
            tr[i].style.display = "";
        } else {
            tr[i].style.display = "none";
        }
    }
}

{% endblock %}
